name: Update CRAN downloads chart

on:
  schedule:
    # Weekly on Monday at 13:17 UTC.
    - cron: "17 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cran-downloads-chart
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
      UPDATE_BRANCH: automation/cran-downloads

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare persistent update branch
        shell: bash
        run: |
          git fetch origin "refs/heads/${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}"
          git fetch origin "refs/heads/${UPDATE_BRANCH}:refs/remotes/origin/${UPDATE_BRANCH}" || true
          git checkout -B "$UPDATE_BRANCH" "origin/$BASE_BRANCH"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.3 --activate

      - name: Install SVG renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Install chart dependencies
        working-directory: tools/cran-downloads
        run: pnpm install --frozen-lockfile

      - name: Update stored CRAN data and chart
        working-directory: tools/cran-downloads
        run: pnpm run update

      - name: Open update pull request
        id: update-pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          paths=(
            tools/cran-downloads/data/bifrost-cran-downloads.json
            tools/cran-downloads/output/cran-downloads.svg
            tools/cran-downloads/output/cran-downloads.png
            man/figures/cran-downloads.png
          )

          if git diff --quiet -- "${paths[@]}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No CRAN downloads changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${paths[@]}"
          git commit -m "Update CRAN downloads data and chart"
          if git show-ref --verify --quiet "refs/remotes/origin/$UPDATE_BRANCH"; then
            git push --force-with-lease origin "$UPDATE_BRANCH:$UPDATE_BRANCH"
          else
            git push origin "$UPDATE_BRANCH:$UPDATE_BRANCH"
          fi

          open_pr_url="$(gh pr list \
            --base "$BASE_BRANCH" \
            --head "$UPDATE_BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url')"

          if [ -n "$open_pr_url" ]; then
            echo "Updated existing PR: $open_pr_url"
          else
            gh pr create \
              --base "$BASE_BRANCH" \
              --head "$UPDATE_BRANCH" \
              --title "Update CRAN downloads data and chart" \
              --body "Automated weekly update of stored CRAN downloads data and the generated chart artifacts."
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
